<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservations — SPARK!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #1B2E4A;
      --yellow: #FFD000;
      --orange: #FF6B2B;
      --sky:    #4A90D9;
      --green:  #4BAF47;
      --cream:  #FDF8F2;
      --warm-white: #FFFDF9;
      --text:   #1B2E4A;
      --muted:  #5a6a7a;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--warm-white);
      color: var(--text);
      line-height: 1.6;
    }

    /* NAV */
    nav {
      background: var(--navy);
      padding: 0.7rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .nav-logo {
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      color: var(--yellow);
      text-decoration: none;
    }
    .nav-logo span { color: var(--orange); }
    .nav-back {
      color: rgba(255,255,255,0.7);
      font-weight: 700;
      font-size: 0.88rem;
      text-decoration: none;
    }
    .nav-back:hover { color: var(--yellow); }

    /* PAGE HEADER */
    .page-header {
      background: var(--navy);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      border-bottom: 4px solid var(--yellow);
    }
    .page-header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--yellow);
      margin-bottom: 0.4rem;
    }
    .page-header p {
      color: rgba(255,255,255,0.6);
      font-weight: 600;
      font-size: 0.9rem;
    }

    /* CONTENT */
    .content {
      max-width: 900px;
      margin: 3rem auto;
      padding: 0 2rem;
    }
    .embed-wrap {
      border-radius: 0.75rem;
      overflow: hidden;
      border: 2px solid #e0d8ce;
    }

    /* FOOTER */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,0.5);
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      margin-top: 3rem;
    }
    footer a { color: var(--yellow); text-decoration: none; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">SPARK<span>!</span></a>
    <a href="index.html" class="nav-back">← Back to main site</a>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>Reservations</h1>
    <p>Reserve your spot at SPARK! Fill out the form below.</p>
  </div>

  <!-- FORM -->
  <div class="content">
    <div class="embed-wrap">
      <iframe class="airtable-embed" src="https://airtable.com/embed/app8YHLM4yub0RLu8/pagnGd97LX0otMK4Q/form" frameborder="0" onmousewheel="" width="100%" height="533" style="background: transparent;"></iframe>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <a href="index.html">← Back to SPARK! main site</a>
  </footer>

</body>
</html>
